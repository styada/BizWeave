services:
  # Local Supabase stack. The supabase/cli image mounts the project and the
  # host's Docker socket, then runs `supabase start`. The CLI spawns the
  # actual Supabase containers (db, auth, storage, realtime, studio, etc.)
  # on the host's Docker daemon and publishes them on:
  #   - 54321 (API / auth)
  #   - 54322 (Postgres)
  #   - 54323 (Studio)
  #   - 54324 (Inbucket / mail catcher)
  # Other services in this compose file reach Supabase through
  # `host.docker.internal` (with `host-gateway` fallback for Linux).
  supabase:
    build:
      context: .
      dockerfile: Dockerfile.supabase
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        SUPABASE_CLI_VERSION: ${SUPABASE_CLI_VERSION:-2.105.0}
    container_name: bizweave-supabase
    working_dir: /project
    volumes:
      - .:/project
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SUPABASE_LOG_LEVEL: info
    command: ["sh", "-c", "supabase start && tail -f /dev/null"]
    healthcheck:
      # `supabase status` returns 0 only when every spawned container is up.
      test: ["CMD-SHELL", "supabase status >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 180s
    restart: unless-stopped

  # One-shot: push the Prisma schema to the Supabase Postgres database.
  # Replaces the old `db` + `frontend-db-init` pair.
  frontend-db-init:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: builder
      args:
        FRONTEND_NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:22-bookworm-slim}
    container_name: bizweave-frontend-db-init
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres?schema=public
      AUTH_SECRET: change-me-in-local-env
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["npm", "run", "db:push", "--", "--accept-data-loss"]
    depends_on:
      supabase:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: bizweave-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@host.docker.internal:54322/postgres
      APP_NAME: bizweave-backend
      ENVIRONMENT: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      supabase:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"" ]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        FRONTEND_NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:22-bookworm-slim}
    container_name: bizweave-frontend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres?schema=public
      AUTH_SECRET: change-me-in-local-env
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      supabase:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend-db-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  scheduler-worker:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        FRONTEND_NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:22-bookworm-slim}
    container_name: bizweave-scheduler-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres?schema=public
      AUTH_SECRET: change-me-in-local-env
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      SCHEDULER_BASE_URL: http://frontend:3000
      SCHEDULER_SECRET: change-me-in-local-env
      SCHEDULER_INTERVAL_MS: "30000"
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      frontend:
        condition: service_started
    command: ["node", "scripts/scheduler-worker.mjs"]
