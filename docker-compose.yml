services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: bizweave-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bizweave
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bizweave"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-test:
    build:
      context: .
      dockerfile: db.test.Dockerfile
    container_name: bizweave-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: bizweave-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/bizweave
      APP_NAME: bizweave-backend
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"" ]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend-db-init:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: builder
      args:
        FRONTEND_NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:22-bookworm-slim}
    container_name: bizweave-frontend-db-init
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bizweave?schema=public
      AUTH_SECRET: change-me-in-local-env
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      NODE_ENV: production
    command: ["npm", "run", "db:push"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        FRONTEND_NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:22-bookworm-slim}
    container_name: bizweave-frontend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bizweave?schema=public
      AUTH_SECRET: change-me-in-local-env
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend-db-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

volumes:
  pgdata:
